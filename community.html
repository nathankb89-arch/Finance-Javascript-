<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community & Sharing</title>
        <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/community.css">
</head>
<body>
    <header>
        <h1>💬 Community & Sharing</h1>
        <nav>
            <button onclick="scrollToSection('posts')">Posts</button>
            <button onclick="scrollToSection('createPost')">Share</button>
        </nav>
    </header>

    <div class="container">
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Total Posts</div>
                <div class="stat-value" id="totalPosts">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Active Members</div>
                <div class="stat-value">156</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Total Shares</div>
                <div class="stat-value" id="totalShares">0</div>
            </div>
        </div>

        <div id="message" class="message"></div>

        <!-- Create Post Section -->
        <div class="portfolio-card" id="createPost">
            <h3>✍️ Share Your Knowledge</h3>
            <form id="postForm">
                <div class="form-group">
                    <label for="authorName">Your Name</label>
                    <input type="text" id="authorName" placeholder="Enter your name" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="Tips">💡 Tips & Tricks</option>
                            <option value="Question">❓ Question</option>
                            <option value="Achievement">🎯 Achievement</option>
                            <option value="Resource">📚 Resource</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" placeholder="Post title" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" placeholder="Share your thoughts, tips, or questions..." required></textarea>
                </div>

                <button type="submit" class="btn">Post</button>
            </form>
        </div>

        <!-- Posts Feed Section -->
        <div class="portfolio-card" id="posts">
            <h3>📰 Community Posts</h3>
            <div id="postsFeed"></div>
            <div id="emptyState" class="empty-state">
                No posts yet. Be the first to share!
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2024 Finance Community. Share, Learn, and Grow Together.</p>
            <div class="footer-bottom">
                <p>Join our community and start making a difference!</p>
            </div>
        </div>
    </footer>

    <script src="community.js">
      
</script>
</body>
