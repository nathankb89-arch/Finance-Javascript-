<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance+ - Expense Tracker</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/expense.css">
</head>
<body>
    <header>
        <h1>💰 Finance+</h1>
        <nav>
            <button onclick="logoutUser()">Logout</button>
        </nav>
    </header>

    <div class="container">
        <div id="messageBox" class="message"></div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Total Expenses</div>
                <div class="stat-value" id="totalExpenses">$0.00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Monthly Average</div>
                <div class="stat-value" id="monthlyAverage">$0.00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Expenses Count</div>
                <div class="stat-value" id="expenseCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Top Category</div>
                <div class="stat-value" id="topCategory">-</div>
            </div>
        </div>

        <div class="portfolio-card">
            <h3>Add New Expense</h3>
            <form id="expenseForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="expenseName">Expense Name</label>
                        <input type="text" id="expenseName" placeholder="e.g., Groceries" required>
                    </div>
                    <div class="form-group">
                        <label for="expenseAmount">Amount ($)</label>
                        <input type="number" id="expenseAmount" placeholder="0.00" step="0.01" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="expenseCategory">Category</label>
                        <select id="expenseCategory" required>
                            <option value="">Select Category</option>
                            <option value="Food">Food</option>
                            <option value="Transportation">Transportation</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Utilities">Utilities</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="expenseDate">Date</label>
                        <input type="date" id="expenseDate" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="expenseDescription">Description (Optional)</label>
                    <input type="text" id="expenseDescription" placeholder="Add notes...">
                </div>
                <button type="submit" class="btn">Add Expense</button>
            </form>
        </div>

        <div class="portfolio-card">
            <h3>Recent Expenses</h3>
            <div id="expensesList" class="portfolio-grid">
                <p style="grid-column: 1/-1; text-align: center; color: #999;">No expenses yet. Add one to get started!</p>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-bottom">
            <p>&copy; 2024 Finance+. All rights reserved.</p>
        </div>
    </footer>

    <script src="/expense.js"></script>
</body>
</html>
