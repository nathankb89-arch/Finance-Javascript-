<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Finance+</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="sign.css">
</head>
<body>
    <header>
        <h1>Finance+</h1>
        <nav>
            <button><a href="landing.html">Home</a></button>
            <button><a href="login.html">Login</a></button>
        </nav>
    </header>

    <div class="container">
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Users Joined</div>
                <div class="stat-value">10,000+</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Portfolios Managed</div>
                <div class="stat-value">50,000+</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Success Rate</div>
                <div class="stat-value">95%</div>
            </div>
        </div>

        <div class="portfolio-card">
            <h3>Join Finance+ Today</h3>
            <div id="message" class="message"></div>
            <form id="signupForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </div>
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
        </div>
    </div>
          <footer class="site-footer">
  <div class="footer-container">
    <div class="footer-column brand-info">
      <h2 class="footer-logo">Finance+</h2>
      <p>Securely managing your wealth with modern technology.</p>
    </div>

    <div class="footer-column links">
      <h3>Quick Links</h3>
      <ul>
        <li><a href="#">Privacy Policy</a></li>
        <li><a href="#">Support Center</a></li>
        <li><a href="#">API Documentation</a></li>
      </ul>
    </div>

    <div class="footer-column social">
      <h3>Connect</h3>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
      <div class="social-icons">
        <a href="https://www.instagram.com/financeplus"><i class="fab fa-instagram"></i></a>
        <a href="https://twitter.com/financeplus"><i class="fab fa-twitter"></i></a>
        <a href="https://www.github.com/financeplus"><i class="fab fa-github"></i></a>
      </div>
    </div>
  </div>

  <div class="footer-bottom">
    <p>&copy; 2026 Finance+ Inc. All rights reserved.</p>
  </div>
</footer>


   

    <script src="sign.js"></script>
       
</body>
</html>
